name: ABEAM Pipeline — Radar da Frota Offshore

on:
  schedule:
    - cron: '0 11 * * *'   # todo dia às 08h BRT (11h UTC)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache de dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar estado anterior (last_processed.json)
        uses: actions/cache@v4
        with:
          path: data/last_processed.json
          key: abeam-state-${{ github.run_id }}
          restore-keys: |
            abeam-state-

      - name: Rodar pipeline ABEAM
        run: python scraper.py
        env:
          WP_URL:      ${{ secrets.WP_URL }}
          WP_USER:     ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          WP_PAGE_ID:  ${{ secrets.WP_PAGE_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          STATIC_DIR:  public/data

      - name: Publicar JSON como artefato
        uses: actions/upload-artifact@v4
        with:
          name: abeam-data-${{ github.run_number }}
          path: |
            data/json/
            data/last_processed.json
          retention-days: 90

      - name: Preparar pasta public para deploy
        run: |
          mkdir -p public/data
          cp index.html public/index.html
          if [ -f data/json/abeam-latest.json ]; then
            cp data/json/abeam-latest.json public/data/abeam-latest.json
            echo "JSON copiado com sucesso."
          elif [ -f public/data/abeam-latest.json ]; then
            echo "JSON já existe em public/data — mantendo versão anterior."
          else
            echo "Nenhum JSON disponível — dashboard não terá dados neste deploy."
          fi

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false

      - name: Exibir resumo no log
        if: always()
        run: |
          echo "## Resultado do Pipeline ABEAM" >> $GITHUB_STEP_SUMMARY
          if [ -f data/json/abeam-latest.json ]; then
            PERIODO=$(python -c "import json; d=json.load(open('data/json/abeam-latest.json')); print(d.get('periodo','?'))")
            TOTAL=$(python -c "import json; d=json.load(open('data/json/abeam-latest.json')); print(d['totais']['total'])")
            echo "- **Período:** $PERIODO" >> $GITHUB_STEP_SUMMARY
            echo "- **Total de embarcações:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **JSON gerado:** \`data/json/abeam-latest.json\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Nenhum dado novo detectado (PDF já processado anteriormente)" >> $GITHUB_STEP_SUMMARY
          fi

name: ABEAM Pipeline

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT / 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar estado anterior
        uses: actions/cache@v4
        with:
          path: data/last_processed.json
          key: abeam-state-${{ github.run_id }}
          restore-keys: |
            abeam-state-

      - name: Rodar pipeline automático
        run: python scraper.py --once
        env:
          WP_URL:      ${{ secrets.WP_URL }}
          WP_USER:     ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          WP_PAGE_ID:  ${{ secrets.WP_PAGE_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          STATIC_DIR:  public/data
          RUN_ONCE:    true

      - name: Publicar artefatos do pipeline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abeam-data-${{ github.run_number }}
          path: |
            data/json/
            data/last_processed.json
            pipeline.log
          retention-days: 90

      - name: Preparar pasta public para deploy
        run: |
          mkdir -p public/data
          cp index.html public/index.html
          if [ -f data/json/abeam-latest.json ]; then
            cp data/json/abeam-latest.json public/data/abeam-latest.json
            echo "Usando JSON gerado pelo pipeline."
          elif [ -f abeam-latest.json ]; then
            cp abeam-latest.json public/data/abeam-latest.json
            echo "Usando JSON seed/versionado no repositório."
          else
            echo "Nenhum JSON disponível para publicar." >&2
            exit 1
          fi

      - name: Deploy no GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

      - name: Resumo do pipeline
        if: always()
        run: |
          echo "## Resultado do Pipeline ABEAM" >> $GITHUB_STEP_SUMMARY
          if [ -f data/json/abeam-latest.json ]; then
            python - <<'PY' >> $GITHUB_STEP_SUMMARY
import json
from pathlib import Path
p = Path('data/json/abeam-latest.json')
d = json.loads(p.read_text())
print(f"- **Período:** {d.get('periodo', '?')}")
print(f"- **Total de embarcações:** {d.get('totais', {}).get('total', '?')}")
print(f"- **Bandeira brasileira:** {d.get('totais', {}).get('brasileira', '?')}")
print(f"- **Bandeira estrangeira:** {d.get('totais', {}).get('estrangeira', '?')}")
val = d.get('validation', {})
print(f"- **Status de validação:** {val.get('status', 'sem status')}")
errs = val.get('errors') or []
warns = val.get('warnings') or []
if errs:
    print(f"- **Erros:** {' | '.join(errs)}")
if warns:
    print(f"- **Avisos:** {' | '.join(warns)}")
PY
          else
            echo "- Nenhum JSON novo gerado; site preservado com o último dado válido." >> $GITHUB_STEP_SUMMARY
          fi
